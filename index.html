<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Motorräder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .motorcycle-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .motorcycle-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .motorcycle-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f0f0f0;
        }
        
        .motorcycle-info {
            padding: 20px;
        }
        
        .motorcycle-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }
        
        .motorcycle-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .detail-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .detail-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .detail-value {
            color: #333;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏍️ Meine Motorräder</h1>
        </header>
        
        <div id="app">
            <div class="loading">⏳ Laden...</div>
        </div>
    </div>

    <script>
        // ⚠️ ERSETZE DIESE BEIDEN WERTE:
        const SUPABASE_URL = "https://dein-projekt.supabase.co"; // Hier eintragen!
        const SUPABASE_ANON_KEY = "eyJhbGc..."; // Hier eintragen!

        const appDiv = document.getElementById('app');

        // Daten laden
        async function loadMotorcycles() {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/motorcycles?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                const motorcycles = await response.json();

                if (!Array.isArray(motorcycles) || motorcycles.length === 0) {
                    appDiv.innerHTML = '<div class="loading">Noch keine Motorräder hinzugefügt!</div>';
                    return;
                }

                appDiv.innerHTML = `
                    <div class="motorcycle-list">
                        ${motorcycles.map(moto => `
                            <div class="motorcycle-card">
                                <img src="${moto.image_url || 'https://via.placeholder.com/400x250?text=Motorrad'}" 
                                     alt="${moto.name}" 
                                     class="motorcycle-image"
                                     onerror="this.src='https://via.placeholder.com/400x250?text=Bild nicht gefunden'">
                                <div class="motorcycle-info">
                                    <div class="motorcycle-name">${moto.name || 'Unbekannt'}</div>
                                    <div class="motorcycle-details">
                                        <div class="detail-item">
                                            <div class="detail-label">Typ</div>
                                            <div class="detail-value">${moto.type || '-'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Jahr</div>
                                            <div class="detail-value">${moto.year || '-'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Hubraum</div>
                                            <div class="detail-value">${moto.cc || '-'} cc</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">PS</div>
                                            <div class="detail-value">${moto.ps || '-'}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                appDiv.innerHTML = `<div class="loading">❌ Fehler: ${error.message}</div>`;
            }
        }

        // Initial laden
        loadMotorcycles();

        // Alle 5 Sekunden neu laden (auto-refresh)
        setInterval(loadMotorcycles, 5000);
    </script>
</body>
</html>
